# Allow app pods to reach Cloud SQL (private IP) and DNS.
# Cloud SQL runs on a private IP within the VPC — the exact IP is assigned at
# provision time, so we allow the full private services range.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-app-egress
  namespace: app
spec:
  podSelector:
    matchLabels:
      app: fastapi
  policyTypes:
    - Egress
  egress:
    # DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Cloud SQL Postgres on private IP (private services CIDR)
    - to:
        - ipBlock:
            cidr: 10.64.0.0/16
      ports:
        - protocol: TCP
          port: 5432
