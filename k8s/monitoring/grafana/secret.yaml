# Grafana admin password as a Kubernetes Secret.
# In production, this would be synced from GCP Secret Manager via the
# Secrets Store CSI Driver + GCP provider, eliminating the K8s Secret entirely.
# This pattern validates in CI and demonstrates the secretKeyRef flow.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
  labels:
    app: grafana
type: Opaque
stringData:
  password: CHANGE_ME
